<!DOCTYPE html>
<html lang="en">
<head>
<title>Text Decoration Test</title>
<style>
body { font-family: serif; font-size: 16px; line-height: 2; }
</style>
</head>
<body>
<p style="text-decoration: underline">Underline text</p>
<p style="text-decoration: overline">Overline text</p>
<p style="text-decoration: line-through">Line-through text</p>
<p style="text-decoration: underline line-through">Underline + Line-through</p>
<p style="text-decoration: underline; text-decoration-color: red">Red underline</p>
<p style="text-decoration: underline; text-decoration-style: dashed">Dashed underline</p>
<p style="text-decoration: underline; text-decoration-style: dotted">Dotted underline</p>
<p style="text-decoration: underline; text-decoration-style: double">Double underline</p>
<p style="text-decoration: underline; text-decoration-style: wavy">Wavy underline</p>
<p style="text-decoration: underline; text-decoration-style: wavy; text-decoration-color: blue">Blue wavy underline</p>
<p>Normal text with <span style="text-decoration: underline">underlined span</span> inside</p>
</body>
</html>
