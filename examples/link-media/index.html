<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Link media example</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="print-only.css" media="print">
</head>
<body>
  <h1>Hello</h1>
  <p>This paragraph reads in the "base" color both in a browser and in fulgur's PDF output. The <code>print-only.css</code> stylesheet is restricted to <code>media="print"</code>; fulgur currently renders with <code>media="screen"</code>, so its rules are excluded.</p>
</body>
</html>
