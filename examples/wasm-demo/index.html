<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>fulgur WASM demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; }
    h1 { margin: 0 0 0.2em; }
    p.note { color: #666; font-size: 0.9em; margin: 0 0 1.2em; }
    textarea { width: 100%; min-height: 8em; font-family: ui-monospace, monospace; box-sizing: border-box; }
    button { padding: 0.5em 1em; font-size: 1em; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: progress; }
    #status { margin-top: 1em; padding: 0.6em; background: #f4f4f4; white-space: pre-wrap; min-height: 1.2em; }
    #status.error { background: #fde7e7; color: #a00; }
    #status.ok { background: #e7f5e7; color: #060; }
  </style>
</head>
<body>
  <h1>fulgur WASM demo</h1>
  <p class="note">
    Browser-side HTML &rarr; PDF rendering, no server required.
    This is the B-1 step (no fonts / CSS / images) &mdash; keep the HTML
    to constructs that need no font, e.g. coloured boxes.
  </p>

  <label for="html">HTML input</label>
  <textarea id="html"><div style="background:red; width:100px; height:100px"></div></textarea>
  <p>
    <button id="render" disabled>Loading WASM&hellip;</button>
  </p>
  <div id="status" role="status" aria-live="polite"></div>

  <script type="module">
    import init, { render_html } from "./pkg/fulgur_wasm.js";

    const button = document.getElementById("render");
    const statusEl = document.getElementById("status");

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = kind ?? "";
    }

    try {
      await init();
      button.disabled = false;
      button.textContent = "Render PDF";
      setStatus("WASM ready.", "ok");
    } catch (e) {
      setStatus(`Failed to load WASM: ${e}`, "error");
      throw e;
    }

    button.addEventListener("click", () => {
      const html = document.getElementById("html").value;
      const t0 = performance.now();
      try {
        const bytes = render_html(html);
        const elapsed = (performance.now() - t0).toFixed(1);
        const blob = new Blob([bytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "output.pdf";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
        setStatus(`Rendered ${bytes.length} bytes in ${elapsed} ms.`, "ok");
      } catch (e) {
        setStatus(`Render failed: ${e}`, "error");
      }
    });
  </script>
</body>
</html>
