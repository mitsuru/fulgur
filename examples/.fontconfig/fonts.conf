<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Pinned fontconfig used by the example PDF regeneration scripts so
  rendering is byte-identical across local, CI, and contributor
  environments. All paths are resolved with prefix="cwd", so this file
  must be consumed via `FONTCONFIG_FILE=...` from commands run at the
  repository root.

  See examples/.fonts/README.md for the rationale and the bundled
  font list.
-->
<fontconfig>
  <!-- Include the system fontconfig rules so that generic-family
       resolution (FcFontSort) works properly under restricted font
       sets (fontique requires FcDefaultSubstitute semantics which
       system rules provide). Our <alias> entries below take priority
       over system mappings for the fonts we actually care about. -->
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

  <!-- Only the bundled Noto Sans set is the preferred source.
       <cachedir> lives under target/ so it is gitignored. -->
  <dir prefix="cwd">examples/.fonts</dir>
  <cachedir prefix="cwd">target/fontconfig-cache</cachedir>

  <!-- Pin freetype/cairo rendering parameters so PDF→PNG output is
       byte-identical across host environments. Even when the same font
       file is selected, different Ubuntu versions ship different
       system defaults for hinting/antialias/lcdfilter/rgba via
       /etc/fonts/conf.d, which causes ~0.2% pixel diffs in italic
       glyph outlines between local dev and CI. -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="rgba" mode="assign"><const>none</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
    <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
  </match>

  <!-- Map generic families to the bundled Noto Sans fonts. JP is
       listed as a fallback after the Latin fonts so mixed Latin +
       Japanese documents resolve via a single alias chain. -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans JP</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans JP</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Noto Sans Mono</family>
      <family>Noto Sans JP</family>
    </prefer>
  </alias>
  <!-- Additional generic families required by fontique's System::new
       initialisation. Map them to Noto Sans so fontconfig never returns
       an empty font-set for any generic family query. -->
  <alias>
    <family>cursive</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>fantasy</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>system-ui</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>emoji</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>math</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
</fontconfig>
