<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Image Rendering Examples</title>
</head>
<body>

<h1>Image Rendering Examples</h1>

<h2>1. Basic Image</h2>
<img src="logo.png" style="width:40px;height:40px">

<h2>2. Scaled Image</h2>
<img src="photo.png" style="width:100px;height:75px">

<h2>3. Image with Border and Padding</h2>
<img src="logo.png" class="bordered" style="width:40px;height:40px">

<h2>4. Multiple Images in Cards</h2>
<div class="row">
  <div class="card">
    <img src="icon.png" style="width:20px;height:20px;margin-bottom:0">
  </div>
  <div class="card">
    <img src="logo.png" style="width:36px;height:36px;margin-bottom:0">
  </div>
  <div class="card">
    <img src="photo.png" style="width:72px;height:54px;margin-bottom:0">
  </div>
</div>

<h2>5. Missing Image (graceful fallback)</h2>
<p>An unresolved image does not cause an error:</p>
<img src="missing.png" style="width:30px;height:30px">

</body>
</html>
