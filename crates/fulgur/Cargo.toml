[package]
name = "fulgur"
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "HTML/CSS to PDF conversion library"
readme = "../../README.md"
keywords = ["pdf", "html", "css", "converter"]
categories = ["text-processing", "command-line-utilities"]

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dependencies]
cssparser = "0.35"
krilla = "0.6.0"
blitz-html = "0.2"
blitz-dom = "0.2"
blitz-traits = "0.2"
parley = "0.6"
skrifa = "0.37"
stylo = "0.8.0"
thiserror = "2"
minijinja = { version = "2", features = ["unstable_machinery"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3.27.0"
