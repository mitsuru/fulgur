<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>VRT fixture: basic/border-radius</title>
<style>
  html,body{margin:0;padding:0}
  .row{display:flex;gap:20px;padding:40px}
  .c{width:100px;height:100px;background:#1e88e5}
  .r1{border-radius:8px}
  .r2{border-radius:24px}
  .r3{border-radius:50%}
  .r4{border-radius:8px 48px}
</style>
</head><body><div class="row">
<div class="c r1"></div>
<div class="c r2"></div>
<div class="c r3"></div>
<div class="c r4"></div>
</div></body></html>
