<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>VRT fixture: layout/inline-grid-smoke</title>
<style>
  html,body{margin:0;padding:0;font-family:sans-serif}
  .wrap{padding:40px}
  .ib{display:inline-grid;grid-template-columns:30px 30px;grid-template-rows:30px 30px;gap:4px;padding:4px;background:#fee;border:1px solid #833}
  .cell{background:#fff;border:1px solid #888}
</style>
</head><body>
<div class="wrap">
  label: <span class="ib"><span class="cell"></span><span class="cell"></span><span class="cell"></span><span class="cell"></span></span>
</div>
</body></html>
