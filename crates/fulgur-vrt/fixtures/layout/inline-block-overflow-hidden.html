<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>VRT fixture: layout/inline-block-overflow-hidden</title>
<style>
  html,body{margin:0;padding:0;font-family:sans-serif}
  .wrap{padding:40px}
  .outer{display:inline-block;width:100px;height:50px;overflow:hidden;background:#eef;border:2px solid #333;vertical-align:top}
  .inner{display:inline-block;width:200px;height:200px;background:#e33}
</style>
</head><body>
<div class="wrap">
  <span class="outer"><span class="inner"></span></span>
</div>
</body></html>
