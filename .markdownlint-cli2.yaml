config:
  # 行の長さ制限を無効化（ドキュメントの可読性を優先）
  MD013: false
  # CHANGELOG等で同名見出しを許可（siblings_onlyで同階層のみ許可）
  MD024:
    siblings_only: true
  # インラインHTMLを許可
  MD033: false
  # MkDocs admonition (`!!! tip`) のインデント本文を code block と
  # 誤判定するため無効化
  MD046: false
  # テーブルのコンパクトスタイルを許可
  MD060: false

ignores:
  - "node_modules/**"
  - "target/**"
  - ".worktrees/**"
  - ".git/**"
  - ".beads/**"
  - "**/.venv/**"
  - "website/site/**"
  - "CHANGELOG.md"
