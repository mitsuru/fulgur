name: Update Examples

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fulgur
        run: cargo build --bin fulgur --release
      - name: Regenerate example PDFs
        run: |
          for dir in examples/*/; do
            html="$dir/index.html"
            css="$dir/style.css"
            pdf="$dir/index.pdf"
            [ -f "$html" ] || continue
            if [ -f "$css" ]; then
              target/release/fulgur render "$html" --css "$css" -o "$pdf"
            else
              target/release/fulgur render "$html" -o "$pdf"
            fi
          done
      - name: Commit updated examples
        run: |
          git diff --quiet examples/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/
          git commit -m "chore: regenerate example PDFs"
          git push
