name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    # Only run on PR events or recheck/sign comments
    if: >
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null &&
        (github.event.comment.body == 'recheck' ||
         github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'

    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: 'https://github.com/fulgur-rs/fulgur/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],github-actions[bot],renovate[bot],Copilot'
          custom-notsigned-prcomment: >
            Thank you for your pull request! Before we can merge this contribution,
            please sign our Contributor License Agreement (CLA). The CLA is a
            one-time agreement that covers all your future contributions to
            **fulgur**.

            You can read the full CLA here: https://github.com/fulgur-rs/fulgur/blob/main/CLA.md

            To sign, please reply to this pull request with the following comment
            on a single line:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. Thanks for your contribution!
          lock-pullrequest-aftermerge: false
