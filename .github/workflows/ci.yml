name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            coverage: true
          - os: ubuntu-24.04-arm
            arch: arm64
            coverage: false
          - os: macos-latest
            arch: arm64
            coverage: false
          - os: windows-latest
            arch: amd64
            coverage: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install poppler-utils (for fulgur-wpt pdftocairo tests)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Install cargo-llvm-cov
        if: matrix.coverage
        uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # cargo-llvm-cov
      - name: Install cargo-nextest
        if: matrix.coverage
        uses: taiki-e/install-action@dfd6a81ff1efc1c100332d760e0c9edfe2ae0a51 # nextest
      # NOTE: fulgur-wpt integration tests (wpt_css_page, wpt_css_multicol)
      # silently skip here because target/wpt is not fetched in the coverage
      # cell — fetching + running all phases would add ~4-5 min to PR CI.
      # That leaves `crates/fulgur-wpt/src/runner.rs` under-reported in
      # Codecov. The WPT coverage surface is exercised by the `wpt` matrix
      # job (in this same workflow) and by nightly; Codecov numbers here
      # only reflect unit-test coverage.
      - name: Build tests
        if: ${{ !matrix.coverage }}
        run: cargo test --workspace --exclude fulgur-vrt --no-run
      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: cargo test --workspace --exclude fulgur-vrt
      - name: Run tests with coverage
        if: matrix.coverage
        run: cargo llvm-cov nextest --workspace --exclude fulgur-vrt --profile ci --lcov --output-path lcov.info
      - name: Upload coverage artifact
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ matrix.coverage && !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: target/nextest/ci/junit.xml
          use_oidc: true
          fail_ci_if_error: false

  vrt:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run VRT
        run: cargo test -p fulgur-vrt
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diffs
          path: target/vrt-diff/
          retention-days: 14
          if-no-files-found: ignore

  octocov:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lcov
      - uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1

  wpt:
    name: wpt / ${{ matrix.phase }}
    runs-on: ubuntu-latest
    # WPT reftests are a reporting channel, not a blocker on PRs.
    # Regressions surface via the step summary and target/wpt-report artifacts.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: css-page
            test: wpt_css_page
          - phase: css-multicol
            test: wpt_css_multicol
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Fetch WPT subset
        run: scripts/wpt/fetch.sh
      - name: Run ${{ matrix.phase }} reftests
        env:
          FULGUR_REVISION: ${{ github.sha }}
        run: cargo test -p fulgur-wpt --test ${{ matrix.test }} -- --nocapture
      - name: Append step summary
        if: always()
        run: |
          summary="target/wpt-report/${{ matrix.phase }}/summary.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "no summary for ${{ matrix.phase }}" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-${{ matrix.phase }}-report
          path: target/wpt-report/${{ matrix.phase }}
          if-no-files-found: warn
