name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Default least-privilege token scope. Jobs that need more (e.g. test's
# id-token: write for Codecov OIDC, octocov's pull-requests: write) override
# this with their own `permissions:` block — job-level permissions fully
# replace the workflow-level set, they do not merge.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            coverage: false
            mold: true
            cache-key: ubuntu-latest-fulgur
          - os: ubuntu-latest
            arch: amd64
            coverage: true
            mold: true
            cache-key: ubuntu-latest-fulgur-cov
          - os: ubuntu-24.04-arm
            arch: arm64
            coverage: false
            mold: true
            cache-key: ubuntu-24.04-arm-fulgur
          - os: macos-latest
            arch: arm64
            coverage: false
            mold: false
            cache-key: macos-latest-fulgur
          - os: windows-latest
            arch: amd64
            coverage: false
            mold: false
            cache-key: windows-latest-fulgur
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache-key }}
      - name: Install poppler-utils (for fulgur-wpt pdftocairo tests)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils mold
      - name: Configure mold linker
        if: matrix.mold
        run: echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> $GITHUB_ENV
      - name: Configure lld-link linker (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "RUSTFLAGS=-C linker=lld-link" >> $GITHUB_ENV
      - name: Install cargo-llvm-cov
        if: matrix.coverage
        uses: taiki-e/install-action@88ada01c46e65c47040a0ae865537cc76fcd0e1c # cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@dfd6a81ff1efc1c100332d760e0c9edfe2ae0a51 # nextest
      # NOTE: fulgur-wpt integration tests (wpt_css_page, wpt_css_multicol)
      # silently skip here because target/wpt is not fetched in the coverage
      # cell — fetching + running all phases would add ~4-5 min to PR CI.
      # That leaves `crates/fulgur-wpt/src/runner.rs` under-reported in
      # Codecov. The WPT coverage surface is exercised by the `wpt` matrix
      # job (in this same workflow) and by nightly; Codecov numbers here
      # only reflect unit-test coverage.
      - name: Build tests
        if: ${{ !matrix.coverage }}
        run: cargo nextest run --workspace --exclude fulgur-vrt --no-run
      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: cargo nextest run --workspace --exclude fulgur-vrt
      - name: Run tests with coverage
        if: matrix.coverage
        run: cargo llvm-cov nextest --workspace --exclude fulgur-vrt --profile ci --lcov --output-path lcov.info
      - name: Upload coverage artifact
        if: matrix.coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ matrix.coverage && !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1
        with:
          files: target/nextest/ci/junit.xml
          use_oidc: true
          fail_ci_if_error: false

  vrt:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-fulgur
      - name: Configure mold linker
        run: echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> $GITHUB_ENV
      - name: Debug font resolution
        run: |
          echo "=== sans-serif:italic ==="
          FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf" \
            fc-match -v 'sans-serif:italic' | grep -E 'file|hinting|antialias|rgba|hintstyle|autohint|lcdfilter' || true
          echo "=== sans-serif ==="
          FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf" \
            fc-match -v 'sans-serif' | grep -E 'file|hinting|antialias|rgba|hintstyle|autohint|lcdfilter' || true
          echo "=== DejaVu Sans (should be rejected) ==="
          FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf" \
            fc-match -v 'DejaVu Sans' | grep 'file' || true
      - name: Run VRT
        run: FONTCONFIG_FILE="$PWD/examples/.fontconfig/fonts.conf" cargo test -p fulgur-vrt
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diffs
          path: target/vrt-diff/
          retention-days: 14
          if-no-files-found: ignore

  octocov:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: lcov
      - uses: k1LoW/octocov-action@73d561f65d59e66899ed5c87e4621a913b5d5c20 # v1

  wpt:
    name: wpt / ${{ matrix.phase }}
    runs-on: ubuntu-latest
    # WPT reftests are a reporting channel, not a blocker on PRs.
    # Regressions surface via the step summary and target/wpt-report artifacts.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: css-page
            test: wpt_css_page
          - phase: css-multicol
            test: wpt_css_multicol
          - phase: bugs
            test: wpt_lists
            filter: wpt_list_bugs
          - phase: smoke
            test: wpt_lists
            filter: wpt_list_smoke
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-fulgur
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils mold
      - name: Configure mold linker
        run: echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> $GITHUB_ENV
      - name: Fetch WPT subset
        run: scripts/wpt/fetch.sh
      - name: Run ${{ matrix.phase }} reftests
        env:
          FULGUR_REVISION: ${{ github.sha }}
          # Tells the integration test to panic (rather than silently skip)
          # if run_phase returns None — this job IS the WPT job, so missing
          # prerequisites are a real bug here.
          FULGUR_WPT_REQUIRED: "1"
        run: cargo test -p fulgur-wpt --test ${{ matrix.test }} -- ${{ matrix.filter }} --nocapture
      - name: Append step summary
        if: always()
        run: |
          summary="target/wpt-report/${{ matrix.phase }}/summary.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "no summary for ${{ matrix.phase }}" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-${{ matrix.phase }}-report
          path: target/wpt-report/${{ matrix.phase }}
          if-no-files-found: warn
