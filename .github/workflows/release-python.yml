name: Release (Python / PyPI)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Publish to TestPyPI instead of PyPI'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            manylinux: "2014"
            rustflags: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            manylinux: "2014"
            rustflags: ""
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            rustflags: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            rustflags: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: "-C linker=lld-link"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}-python-release
      - name: Configure linker
        if: matrix.rustflags != ''
        shell: bash
        run: echo "RUSTFLAGS=${{ matrix.rustflags }}" >> $GITHUB_ENV
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --strip --out dist -m crates/pyfulgur/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist -m crates/pyfulgur/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test-sdist:
    # sdist は wheel 非対応プラットフォームの fallback。requires-python = ">=3.9"
    # の下端 (3.9) と最新 (3.13) で source build を検証する。
    name: Smoke test (sdist / Python ${{ matrix.python-version }})
    needs: [build-sdist]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
      - name: Install sdist (source build)
        shell: bash
        run: |
          shopt -s failglob
          python -m pip install dist/*.tar.gz
      - name: Smoke test
        shell: bash
        run: |
          python -c "
          import pyfulgur
          engine = pyfulgur.Engine()
          pdf = engine.render_html('<p>hi</p>')
          assert isinstance(pdf, (bytes, bytearray)), type(pdf)
          assert len(pdf) > 100, len(pdf)
          print(f'OK: {len(pdf)} bytes')
          "

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    needs: [build-wheels]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: wheels-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            artifact: wheels-aarch64-unknown-linux-gnu
          - os: macos-15-intel
            artifact: wheels-x86_64-apple-darwin
          - os: macos-latest
            artifact: wheels-aarch64-apple-darwin
          - os: windows-latest
            artifact: wheels-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install wheel (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shopt -s failglob
          pip install dist/*.whl
      - name: Install wheel (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          if (-not $wheel) { throw "No wheel found in dist/" }
          pip install $wheel.FullName
      - name: Smoke test
        shell: bash
        run: |
          python -c "
          import pyfulgur
          engine = pyfulgur.Engine()
          pdf = engine.render_html('<p>hi</p>')
          assert isinstance(pdf, (bytes, bytearray)), type(pdf)
          assert len(pdf) > 100, len(pdf)
          print(f'OK: {len(pdf)} bytes')
          "

  # release-prepare.yml が release PR に `release:skip-bindings` ラベルを付けて
  # いれば bindings publish を丸ごと skip する。release event は PR コンテキストを
  # 持たないため、tag → commit → associated PR の順に逆引きしてラベルを参照する。
  check-skip-label:
    name: Check skip-bindings label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" != "release" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA=$(gh api "repos/$GITHUB_REPOSITORY/commits/$TAG" --jq .sha)
          LABELS=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" \
            --jq '.[].labels[].name' 2>/dev/null || true)
          if printf '%s\n' "$LABELS" | grep -qx 'release:skip-bindings'; then
            echo "release:skip-bindings label set on associated PR; skipping PyPI publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, smoke-test, smoke-test-sdist, check-skip-label]
    # 本番 PyPI publish は release イベント (release.yml がタグから発火) のみ。
    # workflow_dispatch からは任意の ref を publish できないようにする (security)。
    # 手動検証は publish-testpypi (dry_run=true) を使う。
    if: github.event_name == 'release' && needs.check-skip-label.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist, smoke-test, smoke-test-sdist]
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
