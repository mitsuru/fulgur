name: WPT nightly

on:
  schedule:
    # 02:00 UTC daily (11:00 JST)
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  wpt:
    name: wpt / ${{ matrix.phase }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: css-page
            test: wpt_css_page
          - phase: multicol-1
            test: wpt_lists
            filter: wpt_list_multicol_1
          - phase: multicol-2
            test: wpt_lists
            filter: wpt_list_multicol_2
          - phase: multicol-3
            test: wpt_lists
            filter: wpt_list_multicol_3
          - phase: bugs
            test: wpt_lists
            filter: wpt_list_bugs
          - phase: smoke
            test: wpt_lists
            filter: wpt_list_smoke
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install poppler-utils
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Fetch WPT subset
        run: scripts/wpt/fetch.sh
      - name: Run ${{ matrix.phase }} reftests
        env:
          FULGUR_REVISION: ${{ github.sha }}
          # Panic instead of silent skip if run_phase returns None — this
          # job IS the WPT job, missing prereqs are a real bug.
          FULGUR_WPT_REQUIRED: "1"
        run: cargo test -p fulgur-wpt --test ${{ matrix.test }} -- ${{ matrix.filter }} --nocapture
      - name: Append step summary
        if: always()
        run: |
          summary="target/wpt-report/${{ matrix.phase }}/summary.md"
          if [ -f "$summary" ]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpt-${{ matrix.phase }}-nightly
          path: target/wpt-report/${{ matrix.phase }}
          if-no-files-found: warn

  # Single post-matrix job that downloads every shard's regressions.json,
  # groups them by phase_group (matrix.phase with any trailing `-<digits>`
  # stripped), and files exactly one issue per group. Doing this in the
  # matrix race-conditioned with parallel shards: each shard would search
  # for an open issue, all see "none", and all create one — yielding up
  # to N duplicate issues per group on the first regression. Aggregation
  # in a serial job eliminates the TOCTOU window entirely.
  regressions-aggregate:
    name: regressions / aggregate
    needs: wpt
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download regression artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wpt-*-nightly
      - name: Aggregate and file issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          declare -A group_count
          declare -A group_phases

          for artifact_dir in artifacts/wpt-*-nightly; do
            [ -d "$artifact_dir" ] || continue
            phase="${artifact_dir#artifacts/wpt-}"
            phase="${phase%-nightly}"
            regressions="$artifact_dir/regressions.json"
            if [ ! -f "$regressions" ]; then
              echo "no regressions.json for ${phase} — skipping"
              continue
            fi
            count=$(jq 'length' "$regressions")
            if [ "$count" = "0" ]; then
              continue
            fi
            group=$(echo "$phase" | sed 's/-[0-9]\+$//')
            prev_count="${group_count[$group]:-0}"
            group_count[$group]=$((prev_count + count))
            prev_phases="${group_phases[$group]:-}"
            entry="${phase} ($count)"
            if [ -n "$prev_phases" ]; then
              group_phases[$group]="${prev_phases}, ${entry}"
            else
              group_phases[$group]="$entry"
            fi
          done

          if [ ${#group_count[@]} -eq 0 ]; then
            echo "no regressions across any shard — done"
            exit 0
          fi

          has_label=0
          if gh label list --search "wpt-nightly-regression" --limit 1 \
               | grep -q "^wpt-nightly-regression"; then
            has_label=1
          fi

          for group in "${!group_count[@]}"; do
            total="${group_count[$group]}"
            phases="${group_phases[$group]}"
            title_prefix="WPT nightly regression: ${group}"

            existing=$(gh issue list \
              --state open \
              --search "\"$title_prefix\" in:title" \
              --limit 1 \
              --json number \
              --jq '.[0].number // empty')

            BODY="Nightly WPT ${group} detected ${total} regression(s) across: ${phases}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Download the matching \`wpt-<phase>-nightly\` artifact(s) for details."

            if [ -n "$existing" ]; then
              echo "open regression issue #${existing} exists for ${group} — commenting"
              gh issue comment "$existing" --body "$BODY"
              continue
            fi

            if [ "$has_label" = "1" ]; then
              gh issue create \
                --title "$title_prefix" \
                --body "$BODY" \
                --label "wpt-nightly-regression"
            else
              gh issue create \
                --title "$title_prefix" \
                --body "$BODY"
            fi
          done
