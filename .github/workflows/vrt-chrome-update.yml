name: VRT Chrome Golden Update

# Manually-triggered workflow that regenerates Chromium screenshot goldens
# under crates/fulgur-vrt/goldens/chrome/. This is intentionally separate
# from the main `vrt` job so:
#   - Chromium binary fetch / large cache does not slow normal PRs
#   - The fulgur-vrt `chrome-golden` feature and its heavy deps
#     (chromiumoxide, tokio, futures, dirs) are only pulled when needed
#   - Golden updates are an explicit decision, not an accidental PR diff
#
# The Chromium revision is pinned in `crates/fulgur-vrt/src/chrome.rs`
# (`CHROMIUM_REVISION` constant). Bump that constant in the same PR that
# commits the regenerated PNGs.
#
# NOTE: Task 5 (initial scaffolding) left the chrome screenshot function
# as `todo!()`. This workflow is a skeleton that will start producing real
# goldens once a follow-up issue finishes the chromiumoxide integration.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chrome-goldens:
    name: Regenerate Chromium goldens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            poppler-utils \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache Chromium download
        uses: actions/cache@v5
        with:
          path: ~/.cache/fulgur-vrt/
          key: chromium-${{ hashFiles('crates/fulgur-vrt/src/chrome.rs') }}

      - name: Generate Chrome goldens
        run: cargo test -p fulgur-vrt --features chrome-golden -- --ignored

      - name: Upload regenerated goldens
        uses: actions/upload-artifact@v4
        with:
          name: chrome-goldens
          path: crates/fulgur-vrt/goldens/chrome/
          retention-days: 30
          if-no-files-found: warn
