name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.6.0). Leave empty to auto-bump minor (ZeroVer policy).'
        required: false
        type: string
      skip_bindings:
        description: 'Skip PyPI / RubyGems / npm publish (core release only). Adds release:skip-bindings label to the release PR.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-release-fulgur

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(grep '^version = ' crates/fulgur/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURRENT"

          if [ -z "$INPUT_VERSION" ]; then
            # ZeroVer auto-bump: minor++ (0.5.14 → 0.6.0). Patches are reserved
            # for hotfixes — pass `version` input explicitly when cutting a patch.
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            MINOR=$((MINOR + 1))
            VERSION="$MAJOR.$MINOR.0"
          else
            VERSION="$INPUT_VERSION"
            # Strip leading 'v' if present
            VERSION="${VERSION#v}"
            # Validate semver format
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' || {
              echo "::error::Version must be semver format, e.g. 0.2.0 (not v0.2.0)"
              exit 1
            }
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION (was $CURRENT)"

      - name: Update version in Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Rust core
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-cli/Cargo.toml
          sed -i "s/fulgur = { version = \"[^\"]*\", path/fulgur = { version = \"$VERSION\", path/" crates/fulgur-cli/Cargo.toml

          # pyfulgur (Python binding)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/pyfulgur/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/pyfulgur/pyproject.toml

          # fulgur-ruby (Ruby binding)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-ruby/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-ruby/ext/fulgur/Cargo.toml
          # ext/fulgur は fulgur を crates.io 参照 (container mount 外のため path 不可)。
          # この依存行も sync する必要がある。
          sed -i "s/^fulgur = \"[^\"]*\"$/fulgur = \"$VERSION\"/" crates/fulgur-ruby/ext/fulgur/Cargo.toml
          # ext 依存は crates.io 公開版を参照する特殊運用のため、
          # 置換失敗をリリース後まで気づかないと致命的。即時検証でフェイルファスト。
          grep -Eq "^fulgur = \"$VERSION\"$" crates/fulgur-ruby/ext/fulgur/Cargo.toml || {
            echo "::error::Failed to sync fulgur dependency version in crates/fulgur-ruby/ext/fulgur/Cargo.toml"
            exit 1
          }
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" crates/fulgur-ruby/lib/fulgur/version.rb

          cargo check --workspace

      # PR-based changelog: ask GitHub to render notes from merged PRs since the
      # last release, classified by `release-notes:*` labels per .github/release.yml.
      # `previous_tag_name` is auto-detected when omitted.
      - name: Generate release notes from PRs
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            -f tag_name="v$VERSION" \
            --jq .body > RELEASE_NOTES.md

      - name: Prepend new section to CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Drop the API's "## What's Changed" preamble so categories nest
          # cleanly under "## [VERSION] - DATE" as H3.
          sed -i "/^## What's Changed$/d" RELEASE_NOTES.md
          {
            echo "# Changelog"
            echo
            echo "All notable changes to this project will be documented in this file."
            echo
            echo "## [$VERSION] - $DATE"
            echo
            cat RELEASE_NOTES.md
            echo
            # Skip the existing top-of-file header and keep history from the first
            # versioned section onward (matches git-cliff's prior output shape).
            awk '/^## \[/{found=1} found' CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SKIP_BINDINGS: ${{ inputs.skip_bindings }}
        run: |
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up existing branch/PR if re-running.
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          # RELEASE_NOTES.md is a transient artifact handed to the draft release
          # step below; keep it on disk but out of the commit.
          git add -A
          git reset HEAD -- RELEASE_NOTES.md
          git commit -m "release: v$VERSION"
          git push origin "$BRANCH"

          PR_LABEL_ARGS=()
          SKIP_NOTE=""
          if [ "$SKIP_BINDINGS" = "true" ]; then
            PR_LABEL_ARGS=(--label release:skip-bindings)
            SKIP_NOTE=$'\n\n> **skip_bindings=true**: PyPI / RubyGems / npm publish will be skipped for this release.'
          fi

          gh pr create \
            --title "release: v$VERSION" \
            --body "$(cat <<EOF
          ## Release v$VERSION

          - Version bumped in Cargo.toml
          - CHANGELOG.md updated (PR-based notes)
          - Draft GitHub Release created

          **Merging this PR will automatically:**
          1. Tag \`v$VERSION\`
          2. Publish to crates.io
          3. Build binaries (linux gnu/musl, macOS, Windows)
          4. Publish the draft GitHub Release with binary assets$SKIP_NOTE
          EOF
          )" \
            --base main \
            --head "$BRANCH" \
            "${PR_LABEL_ARGS[@]}"

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Delete existing draft release if re-running
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            --draft
