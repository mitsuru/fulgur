name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Leave empty to auto-bump patch.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(grep '^version = ' crates/fulgur/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURRENT"

          if [ -z "$INPUT_VERSION" ]; then
            # Auto-bump patch: 0.1.0 → 0.1.1
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          else
            VERSION="$INPUT_VERSION"
            # Strip leading 'v' if present
            VERSION="${VERSION#v}"
            # Validate semver format
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' || {
              echo "::error::Version must be semver format, e.g. 0.2.0 (not v0.2.0)"
              exit 1
            }
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION (was $CURRENT)"

      - name: Update version in Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-cli/Cargo.toml
          sed -i "s/fulgur = { version = \"[^\"]*\", path/fulgur = { version = \"$VERSION\", path/" crates/fulgur-cli/Cargo.toml
          cargo check --workspace

      - name: Generate changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git-cliff --tag "v$VERSION" -o CHANGELOG.md

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up existing branch/PR if re-running
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --title "release: v$VERSION" \
            --body "$(cat <<EOF
          ## Release v$VERSION

          - Version bumped in Cargo.toml
          - CHANGELOG.md updated
          - Draft GitHub Release created

          **Merging this PR will automatically:**
          1. Tag \`v$VERSION\`
          2. Publish to crates.io
          3. Build binaries (linux gnu/musl, macOS, Windows)
          4. Publish the draft GitHub Release with binary assets
          EOF
          )" \
            --base main \
            --head "$BRANCH"

      - name: Generate release notes for draft
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git-cliff --tag "v$VERSION" --latest --strip header -o RELEASE_NOTES.md

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Delete existing draft release if re-running
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            --draft
