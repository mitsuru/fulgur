name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Leave empty to auto-bump patch.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-release-fulgur

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: "2.7.0"
        run: |
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/git-cliff-*/git-cliff /usr/local/bin/

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(grep '^version = ' crates/fulgur/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURRENT"

          if [ -z "$INPUT_VERSION" ]; then
            # Auto-bump patch: 0.1.0 → 0.1.1
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          else
            VERSION="$INPUT_VERSION"
            # Strip leading 'v' if present
            VERSION="${VERSION#v}"
            # Validate semver format
            echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' || {
              echo "::error::Version must be semver format, e.g. 0.2.0 (not v0.2.0)"
              exit 1
            }
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION (was $CURRENT)"

      - name: Update version in Cargo.toml
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Rust core
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-cli/Cargo.toml
          sed -i "s/fulgur = { version = \"[^\"]*\", path/fulgur = { version = \"$VERSION\", path/" crates/fulgur-cli/Cargo.toml

          # pyfulgur (Python binding)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/pyfulgur/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/pyfulgur/pyproject.toml

          # fulgur-ruby (Ruby binding)
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-ruby/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" crates/fulgur-ruby/ext/fulgur/Cargo.toml
          # ext/fulgur は fulgur を crates.io 参照 (container mount 外のため path 不可)。
          # この依存行も sync する必要がある。
          sed -i "s/^fulgur = \"[^\"]*\"$/fulgur = \"$VERSION\"/" crates/fulgur-ruby/ext/fulgur/Cargo.toml
          # ext 依存は crates.io 公開版を参照する特殊運用のため、
          # 置換失敗をリリース後まで気づかないと致命的。即時検証でフェイルファスト。
          grep -Eq "^fulgur = \"$VERSION\"$" crates/fulgur-ruby/ext/fulgur/Cargo.toml || {
            echo "::error::Failed to sync fulgur dependency version in crates/fulgur-ruby/ext/fulgur/Cargo.toml"
            exit 1
          }
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" crates/fulgur-ruby/lib/fulgur/version.rb

          cargo check --workspace

      - name: Generate changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git-cliff --tag "v$VERSION" -o CHANGELOG.md

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Clean up existing branch/PR if re-running
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "release: v$VERSION"
          git push origin "$BRANCH"

          gh pr create \
            --title "release: v$VERSION" \
            --body "$(cat <<EOF
          ## Release v$VERSION

          - Version bumped in Cargo.toml
          - CHANGELOG.md updated
          - Draft GitHub Release created

          **Merging this PR will automatically:**
          1. Tag \`v$VERSION\`
          2. Publish to crates.io
          3. Build binaries (linux gnu/musl, macOS, Windows)
          4. Publish the draft GitHub Release with binary assets
          EOF
          )" \
            --base main \
            --head "$BRANCH"

      - name: Generate release notes for draft
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: git-cliff --tag "v$VERSION" --unreleased --strip header -o RELEASE_NOTES.md

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Delete existing draft release if re-running
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file RELEASE_NOTES.md \
            --draft
