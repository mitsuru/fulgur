name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    # tag push / crates.io publish は irreversible なので required_reviewers で gate する。
    # Environment `release` に reviewers を設定すること (docs/RELEASE_SETUP.md)。
    environment: release
    # id-token: write は rust-lang/crates-io-auth-action が OIDC token を
    # 取得するために必要 (crates.io Trusted Publisher フロー)。contents: write
    # はトップレベル permissions を job 側で override すると消えるので再指定する。
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Extract version from branch name
        id: version
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          VERSION="${BRANCH#release/v}"
          # Validate semver format
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version from branch name: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      # tag が指す commit に .github/workflows/*.yml の変更が含まれると、
      # GITHUB_TOKEN では push が拒否される (workflows permission が無いため)。
      # release bot App token は `Workflows: Read and write` 権限を持つ
      # 前提で発行されるので、そちらを使う (docs/RELEASE_SETUP.md 参照)。
      - name: Generate App token for tag push
        id: app-token-tag
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Tag release
        env:
          GH_TOKEN: ${{ steps.app-token-tag.outputs.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "v$VERSION" || true
          git push origin "v$VERSION" --force

      # crates.io Trusted Publishing: rust-lang/crates-io-auth-action が OIDC
      # claim (repo + workflow + environment) を crates.io に提示して短命 token
      # を発行する。長期 PAT (CARGO_REGISTRY_TOKEN) を secrets に持たなくてよい。
      - name: Authenticate to crates.io
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish fulgur (lib)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish -p fulgur

      - name: Publish fulgur-cli (with retry)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            echo "Attempt $i: publishing fulgur-cli..."
            if cargo publish -p fulgur-cli 2>&1; then
              echo "Published successfully."
              exit 0
            fi
            WAIT=$((15 * i))
            echo "Failed. Waiting ${WAIT}s for crates.io index..."
            sleep "$WAIT"
          done
          echo "::error::Failed to publish fulgur-cli after 8 attempts"
          exit 1

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.publish.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --bin fulgur -p fulgur-cli --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../fulgur-v${{ needs.publish.outputs.version }}-${{ matrix.target }}.tar.gz fulgur
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/fulgur.exe" -DestinationPath "fulgur-v${{ needs.publish.outputs.version }}-${{ matrix.target }}.zip"

      - name: Stage npm binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p npm-bin
          cp target/${{ matrix.target }}/release/fulgur npm-bin/fulgur

      - name: Stage npm binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force npm-bin
          Copy-Item "target/${{ matrix.target }}/release/fulgur.exe" "npm-bin/fulgur.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.target }}
          path: npm-bin/

      - uses: actions/upload-artifact@v4
        with:
          name: fulgur-${{ matrix.target }}
          path: fulgur-v${{ needs.publish.outputs.version }}-${{ matrix.target }}.*

  release:
    name: Publish GitHub Release
    needs: [publish, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'fulgur-*'
          merge-multiple: true

      # GITHUB_TOKEN で発火した release:published は別 workflow を起動しない
      # (無限ループ防止仕様)。release-python.yml / release-ruby.yml を連鎖発火
      # させるため、App token で publish する。
      # 手順は docs/RELEASE_SETUP.md を参照。
      - name: Generate App token for release publish
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Upload binaries and publish release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          REPO="${{ github.repository }}"
          # Create release if draft doesn't exist (fallback)
          if ! gh release view "v$VERSION" --repo "$REPO" &>/dev/null; then
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --notes "Release v$VERSION" \
              --draft \
              --repo "$REPO"
          fi
          # Upload binaries and publish (App token → release:published が連鎖発火)
          # --clobber: approval gate reject 等での re-run 時に同名 asset を上書き
          gh release upload "v$VERSION" artifacts/* --clobber --repo "$REPO"
          gh release edit "v$VERSION" --draft=false --repo "$REPO"

  publish-npm:
    name: Publish npm packages
    needs: [publish, build-binaries]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.publish.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm-artifacts
          merge-multiple: false

      - name: Publish platform packages
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -e
          declare -A TARGET_TO_DIR=(
            ["x86_64-unknown-linux-gnu"]="linux-x64"
            ["x86_64-unknown-linux-musl"]="linux-x64-musl"
            ["aarch64-unknown-linux-gnu"]="linux-arm64"
            ["aarch64-apple-darwin"]="darwin-arm64"
            ["x86_64-apple-darwin"]="darwin-x64"
            ["x86_64-pc-windows-msvc"]="win32-x64"
          )

          for target in "${!TARGET_TO_DIR[@]}"; do
            dir="${TARGET_TO_DIR[$target]}"
            pkg_dir="packages/npm/$dir"
            artifact_dir="npm-artifacts/npm-$target"

            if [ -f "$artifact_dir/fulgur.exe" ]; then
              cp "$artifact_dir/fulgur.exe" "$pkg_dir/bin/fulgur.exe"
            else
              cp "$artifact_dir/fulgur" "$pkg_dir/bin/fulgur"
              chmod +x "$pkg_dir/bin/fulgur"
            fi

            cd "$pkg_dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            PKG_NAME=$(node -p "require('./package.json').name")
            if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
              echo "Already published ${PKG_NAME}@${VERSION}, skipping."
            else
              npm publish --access public --provenance
            fi
            cd - > /dev/null
          done

      - name: Publish meta package
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd packages/npm/meta
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            for (const k of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null | grep -qF "${VERSION}"; then
            echo "Already published ${PKG_NAME}@${VERSION}, skipping."
          else
            npm publish --access public --provenance
          fi
